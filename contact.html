<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Hammond</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <nav class="glass-nav" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo"><img src="assets/icon.jpg" alt="" class="nav-logo-icon">Hammond</a>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="blog.html" class="nav-link">Blog</a></li>
                <li><a href="projects.html" class="nav-link">Projects</a></li>
                <li><a href="contact.html" class="nav-link active">Contact</a></li>
            </ul>
        </div>
    </nav>

    <section class="page-header">
        <h1>Contact</h1>
        <p>Feel free to reach out for questions or just to say hello.</p>
    </section>

    <section class="section" style="padding-top: 0;">
        <div class="container">
            <div class="contact-grid">
                <div class="glass-card contact-info fade-in-up">
                    <h3>Let's Connect</h3>
                    <div class="contact-item">
                        <div class="contact-icon">🐙</div>
                        <div class="contact-item-text">
                            <strong>GitHub</strong><br>
                            <a href="https://github.com/Hammond65" target="_blank" rel="noopener noreferrer">github.com/Hammond65</a>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon">🌐</div>
                        <div class="contact-item-text">
                            <strong>Website</strong><br>
                            <a href="https://hammond65.github.io" target="_blank" rel="noopener noreferrer">hammond65.github.io</a>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon">📍</div>
                        <div class="contact-item-text">
                            <strong>Location</strong><br>
                            聖方濟各大學 (St. Francis University)
                        </div>
                    </div>
                </div>

                <div class="glass-card contact-form-card fade-in-up" style="animation-delay: 0.1s;">
                    <h3 style="font-size: 1.3rem; font-weight: 600; margin-bottom: 1.5rem; color: var(--color-text);">Send a Message</h3>
                    <form id="contactForm" onsubmit="handleContactSubmit(event)">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" required placeholder="Your name">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required placeholder="your@email.com">
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" required placeholder="Your message..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary glow-btn" style="width: 100%; justify-content: center;">Send Message</button>
                        <div id="contactMsg" class="admin-msg"></div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer class="glass-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="https://github.com/Hammond65" target="_blank" rel="noopener noreferrer" class="footer-link">GitHub</a>
                    <a href="contact.html" class="footer-link">Contact</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        function handleContactSubmit(e) {
            e.preventDefault();
            const msg = document.getElementById('contactMsg');
            msg.className = 'admin-msg success';
            msg.textContent = 'Thank you! Your message has been noted. Since this is a static site, please reach out via GitHub for a faster response.';
            e.target.reset();
        }
    </script>
</body>
</html>
