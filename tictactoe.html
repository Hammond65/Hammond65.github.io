<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary:   #7dd3fc;
            --color-secondary: #c4b5fd;
            --color-accent:    #f0abfc;
            --color-text:      #f1f5f9;
            --color-muted:     #94a3b8;
            --color-bg:        #0f172a;
            --glass-bg:        rgba(255, 255, 255, 0.06);
            --glass-border:    rgba(255, 255, 255, 0.12);
            --radius:          18px;
            --ease:            0.28s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ── Background ── */
        .bg-gradient {
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(56,189,248,.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(167,139,250,.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(244,114,182,.06) 0%, transparent 50%);
            z-index: -2; pointer-events: none;
        }
        .orb {
            position: fixed; border-radius: 50%; filter: blur(80px);
            pointer-events: none; z-index: -1;
            animation: drift 22s ease-in-out infinite;
        }
        .orb-1 { width: 420px; height: 420px; background: rgba(56,189,248,.07);   top: -120px; left: -120px; animation-delay: 0s; }
        .orb-2 { width: 360px; height: 360px; background: rgba(167,139,250,.07);  bottom: -120px; right: -120px; animation-delay: -8s; }
        .orb-3 { width: 280px; height: 280px; background: rgba(244,114,182,.05);  top: 40%; left: 55%; animation-delay: -15s; }
        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%  { transform: translate(25px, -30px) scale(1.04); }
            66%  { transform: translate(-20px, 18px) scale(.97); }
        }

        /* ── Top bar ── */
        .top-bar {
            width: 100%; max-width: 620px;
            padding: 1.2rem 1.5rem .5rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .back-link {
            color: var(--color-primary); text-decoration: none;
            font-size: .9rem; font-weight: 500;
            transition: opacity .2s;
        }
        .back-link:hover { opacity: .65; }
        .nav-btn {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 10px; color: var(--color-text);
            padding: .42rem 1rem; font-family: inherit; font-size: .85rem;
            cursor: pointer; transition: background var(--ease), border-color var(--ease);
        }
        .nav-btn:hover { background: rgba(125,211,252,.12); border-color: rgba(125,211,252,.35); }

        /* ── Screens ── */
        .screen {
            width: 100%; max-width: 620px;
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 1rem 1.5rem 2.5rem;
        }
        .screen-title {
            font-size: 1.9rem; font-weight: 700; margin-bottom: .35rem;
            background: linear-gradient(135deg, #7dd3fc 0%, #c4b5fd 60%, #f0abfc 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; text-align: center;
        }
        .screen-sub {
            color: var(--color-muted); font-size: .9rem;
            margin-bottom: 2rem; text-align: center;
        }

        /* ── Mode cards ── */
        .mode-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 1rem; width: 100%;
        }
        @media (max-width: 500px) {
            .mode-grid { grid-template-columns: 1fr; }
        }
        .mode-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: var(--radius); padding: 2rem 1rem 1.6rem;
            text-align: center; cursor: pointer; position: relative; overflow: hidden;
            transition: transform var(--ease), border-color var(--ease), box-shadow var(--ease);
        }
        .mode-card::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(125,211,252,.06), rgba(196,181,253,.06));
            opacity: 0; transition: opacity .3s;
        }
        .mode-card:hover { transform: translateY(-6px); border-color: rgba(125,211,252,.4); box-shadow: 0 14px 40px rgba(125,211,252,.1); }
        .mode-card:hover::after { opacity: 1; }
        .mode-card:active { transform: translateY(-2px); }
        .card-icon { font-size: 2.4rem; margin-bottom: .65rem; }
        .card-name { font-weight: 700; font-size: 1.1rem; margin-bottom: .5rem; }
        .card-badge {
            display: inline-block; font-size: .7rem; font-weight: 600;
            padding: .2rem .7rem; border-radius: 20px; margin-bottom: .6rem;
            letter-spacing: .03em;
        }
        .badge-classic  { background: rgba(125,211,252,.14); color: #7dd3fc;  border: 1px solid rgba(125,211,252,.3); }
        .badge-advanced { background: rgba(196,181,253,.14); color: #c4b5fd;  border: 1px solid rgba(196,181,253,.3); }
        .badge-expert   { background: rgba(240,171,252,.14); color: #f0abfc;  border: 1px solid rgba(240,171,252,.3); }
        .card-desc { font-size: .78rem; color: var(--color-muted); line-height: 1.6; }

        /* ── Opponent cards ── */
        .opp-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 1rem; width: 100%; max-width: 400px;
        }
        .opp-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: var(--radius); padding: 2.2rem 1rem;
            text-align: center; cursor: pointer;
            transition: transform var(--ease), border-color var(--ease), box-shadow var(--ease);
        }
        .opp-card:hover { transform: translateY(-5px); border-color: rgba(125,211,252,.4); box-shadow: 0 12px 34px rgba(125,211,252,.1); }
        .opp-card:active { transform: translateY(-1px); }
        .opp-icon  { font-size: 2.1rem; margin-bottom: .5rem; }
        .opp-label { font-weight: 700; font-size: 1.05rem; margin-bottom: .3rem; }
        .opp-desc  { font-size: .78rem; color: var(--color-muted); }

        .back-btn {
            margin-top: 1.6rem; color: var(--color-muted);
            background: none; border: none; font-family: inherit;
            font-size: .85rem; cursor: pointer;
            text-decoration: underline; text-underline-offset: 3px;
            transition: color .2s;
        }
        .back-btn:hover { color: var(--color-text); }

        /* ── Game screen ── */
        #screenGame { justify-content: flex-start; padding-top: .6rem; }

        .score-row {
            display: flex; gap: .75rem; width: 100%; margin-bottom: .85rem;
        }
        .score-box {
            flex: 1; background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 14px; padding: .6rem .8rem; text-align: center;
            transition: border-color .3s;
        }
        .score-box.active-turn { border-color: rgba(125,211,252,.45); }
        .score-label { font-size: .68rem; color: var(--color-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
        .score-val   { font-size: 1.55rem; font-weight: 800; line-height: 1.2; margin-top: .15rem; }
        .x-color     { color: #7dd3fc; }
        .o-color     { color: #fb923c; }
        .draw-color  { color: var(--color-muted); }

        .status-bar {
            width: 100%; background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 13px; padding: .7rem 1.4rem; font-size: .95rem; font-weight: 600;
            text-align: center; margin-bottom: .85rem; min-height: 3rem;
            display: flex; align-items: center; justify-content: center;
            transition: border-color .3s, color .3s;
        }
        .status-bar.s-x    { border-color: rgba(125,211,252,.4);  color: var(--color-text); }
        .status-bar.s-o    { border-color: rgba(251,146,60,.4);   color: var(--color-text); }
        .status-bar.s-winx { border-color: rgba(74,222,128,.5);   color: #4ade80; }
        .status-bar.s-wino { border-color: rgba(251,146,60,.5);   color: #fb923c; }
        .status-bar.s-draw { border-color: rgba(148,163,184,.3);  color: var(--color-muted); }

        /* ── Board ── */
        .board-wrap { display: flex; justify-content: center; width: 100%; margin-bottom: .85rem; }
        .board { display: grid; gap: 8px; }

        .cell {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: 800;
            transition: background var(--ease), border-color var(--ease), transform .12s, box-shadow .2s;
            aspect-ratio: 1; position: relative;
        }
        .cell:hover:not(.filled):not(.blocked) {
            background: rgba(255,255,255,.09);
            border-color: rgba(125,211,252,.38);
            transform: scale(0.96);
        }
        .cell:active:not(.filled):not(.blocked) { transform: scale(0.93); }
        .cell.filled  { cursor: default; }
        .cell.blocked { cursor: not-allowed; }
        .cell.x-cell  { color: #7dd3fc; }
        .cell.o-cell  { color: #fb923c; }
        .cell.win-cell {
            background: rgba(74,222,128,.14);
            border-color: rgba(74,222,128,.55);
            box-shadow: 0 0 22px rgba(74,222,128,.18);
        }
        .cell.x-cell.win-cell { background: rgba(125,211,252,.14); border-color: rgba(125,211,252,.55); box-shadow: 0 0 22px rgba(125,211,252,.18); }
        .cell.o-cell.win-cell { background: rgba(251,146,60,.14);  border-color: rgba(251,146,60,.55);  box-shadow: 0 0 22px rgba(251,146,60,.18); }

        @keyframes pop {
            0%   { transform: scale(0.3); opacity: 0; }
            60%  { transform: scale(1.18); opacity: 1; }
            100% { transform: scale(1); }
        }
        .mark { display: inline-block; animation: pop .22s ease-out forwards; }
        @keyframes win-pulse {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.08); }
        }
        .win-cell .mark { animation: pop .22s ease-out forwards, win-pulse .7s ease-in-out .3s 3; }

        /* ── Action row ── */
        .action-row { display: flex; gap: .7rem; width: 100%; }
        .action-btn {
            flex: 1; padding: .72rem 1rem;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 12px; color: var(--color-text);
            font-family: inherit; font-size: .9rem; font-weight: 500;
            cursor: pointer; transition: background var(--ease), border-color var(--ease);
        }
        .action-btn:hover { background: rgba(125,211,252,.12); border-color: rgba(125,211,252,.35); }
        .action-btn.primary {
            background: linear-gradient(135deg, rgba(125,211,252,.18), rgba(196,181,253,.18));
            border-color: rgba(125,211,252,.4);
        }
        .action-btn.primary:hover {
            background: linear-gradient(135deg, rgba(125,211,252,.28), rgba(196,181,253,.28));
        }
    </style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="top-bar">
    <a href="index.html" class="back-link">← Home</a>
    <button class="nav-btn" id="menuBtn" style="display:none" onclick="showModeScreen()">⊞ Menu</button>
</div>

<!-- ═══════════════════════════════ SCREEN 1 — Mode Select ═══════════════════════════════ -->
<div class="screen" id="screenMode">
    <div class="screen-title">Tic Tac Toe</div>
    <div class="screen-sub">Choose a board size to play</div>
    <div class="mode-grid">
        <div class="mode-card" onclick="pickMode(3,3)">
            <div class="card-icon">⬛</div>
            <div class="card-name">Classic</div>
            <div><span class="card-badge badge-classic">3 × 3</span></div>
            <div class="card-desc">Get <strong>3</strong> in a row.<br>The original format.</div>
        </div>
        <div class="mode-card" onclick="pickMode(4,4)">
            <div class="card-icon">🔷</div>
            <div class="card-name">Advanced</div>
            <div><span class="card-badge badge-advanced">4 × 4</span></div>
            <div class="card-desc">Get <strong>4</strong> in a row.<br>Demands more strategy.</div>
        </div>
        <div class="mode-card" onclick="pickMode(5,4)">
            <div class="card-icon">🌟</div>
            <div class="card-name">Expert</div>
            <div><span class="card-badge badge-expert">5 × 5</span></div>
            <div class="card-desc">Get <strong>4</strong> in a row<br>on a bigger field.</div>
        </div>
    </div>
</div>

<!-- ═══════════════════════════════ SCREEN 2 — Opponent Select ════════════════════════════ -->
<div class="screen" id="screenOpponent" style="display:none">
    <div class="screen-title" id="oppTitle"></div>
    <div class="screen-sub" id="oppSub"></div>
    <div class="opp-grid">
        <div class="opp-card" onclick="startGame('ai')">
            <div class="opp-icon">🤖</div>
            <div class="opp-label">vs AI</div>
            <div class="opp-desc">Challenge the computer</div>
        </div>
        <div class="opp-card" onclick="startGame('2p')">
            <div class="opp-icon">👥</div>
            <div class="opp-label">2 Players</div>
            <div class="opp-desc">Local pass-and-play</div>
        </div>
    </div>
    <button class="back-btn" onclick="showModeScreen()">← Back to mode select</button>
</div>

<!-- ═══════════════════════════════ SCREEN 3 — Game ══════════════════════════════════════ -->
<div class="screen" id="screenGame" style="display:none">

    <div class="score-row">
        <div class="score-box" id="boxX">
            <div class="score-label" id="labelX">Player X</div>
            <div class="score-val x-color" id="scoreX">0</div>
        </div>
        <div class="score-box" id="boxD">
            <div class="score-label">Draw</div>
            <div class="score-val draw-color" id="scoreD">0</div>
        </div>
        <div class="score-box" id="boxO">
            <div class="score-label" id="labelO">Player O</div>
            <div class="score-val o-color" id="scoreO">0</div>
        </div>
    </div>

    <div class="status-bar s-x" id="statusBar">—</div>

    <div class="board-wrap">
        <div class="board" id="board"></div>
    </div>

    <div class="action-row">
        <button class="action-btn primary" onclick="restartRound()">↺ Restart</button>
        <button class="action-btn" onclick="showOpponentScreen()">⇄ Change Opponent</button>
        <button class="action-btn" onclick="showModeScreen()">⊞ Menu</button>
    </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let boardSize = 3, winLen = 3;
let vsAI      = true;
let board     = [];
let curPlayer = 'X';
let gameOver  = false;
let winCells  = [];
let aiTimer   = null;
let scores    = { X: 0, O: 0, D: 0 };

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
function showModeScreen() {
    cancelAI();
    _show('screenMode');
    _hide('screenOpponent');
    _hide('screenGame');
    _hide('menuBtn');
}

function showOpponentScreen() {
    cancelAI();
    _hide('screenGame');
    _show('screenOpponent');
    // keep menuBtn visible so user can go back to mode too
}

function pickMode(size, win) {
    boardSize = size;
    winLen    = win;
    const names = { 3: 'Classic  3 × 3', 4: 'Advanced  4 × 4', 5: 'Expert  5 × 5' };
    _el('oppTitle').textContent = names[size];
    _el('oppSub').textContent   = `Get ${win} in a row to win`;
    _hide('screenMode');
    _show('screenOpponent');
}

function startGame(opponent) {
    vsAI = opponent === 'ai';
    scores = { X: 0, O: 0, D: 0 };
    _el('labelX').textContent = 'You (X)';
    _el('labelO').textContent = vsAI ? 'AI (O)' : 'Player O';
    _el('menuBtn').style.display = 'block';
    _hide('screenOpponent');
    _show('screenGame');
    restartRound();
}

// ═══════════════════════════════════════════════════════════════
// GAME CORE
// ═══════════════════════════════════════════════════════════════
function restartRound() {
    cancelAI();
    board     = Array(boardSize * boardSize).fill(null);
    curPlayer = 'X';
    gameOver  = false;
    winCells  = [];
    renderBoard();
    updateStatus();
    updateScores();
}

function cellClick(idx) {
    if (gameOver || board[idx] || (vsAI && curPlayer === 'O')) return;
    doMove(idx);
}

function doMove(idx) {
    board[idx] = curPlayer;

    const result = findWinner();
    if (result) {
        winCells = result.cells;
        gameOver = true;
        scores[curPlayer]++;
        renderBoard();
        const msg = vsAI
            ? (curPlayer === 'X' ? '🎉 You win!' : '🤖 AI wins!')
            : `🎉 Player ${curPlayer} wins!`;
        setStatus(msg, curPlayer === 'X' ? 's-winx' : 's-wino');
        updateScores();
        return;
    }

    if (board.every(Boolean)) {
        gameOver = true;
        scores.D++;
        renderBoard();
        setStatus("🤝 It's a draw!", 's-draw');
        updateScores();
        return;
    }

    curPlayer = curPlayer === 'X' ? 'O' : 'X';
    renderBoard();
    updateStatus();

    if (vsAI && curPlayer === 'O' && !gameOver) {
        scheduleAI();
    }
}

// ═══════════════════════════════════════════════════════════════
// WIN DETECTION
// ═══════════════════════════════════════════════════════════════
function findWinner(b, size, win) {
    b    = b    ?? board;
    size = size ?? boardSize;
    win  = win  ?? winLen;

    const dirs = [[0,1],[1,0],[1,1],[1,-1]];
    for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
            const val = b[r * size + c];
            if (!val) continue;
            for (const [dr, dc] of dirs) {
                const er = r + dr * (win - 1);
                const ec = c + dc * (win - 1);
                if (er < 0 || er >= size || ec < 0 || ec >= size) continue;
                let ok = true;
                const cells = [];
                for (let k = 0; k < win; k++) {
                    const ni = (r + dr * k) * size + (c + dc * k);
                    if (b[ni] !== val) { ok = false; break; }
                    cells.push(ni);
                }
                if (ok) return { player: val, cells };
            }
        }
    }
    return null;
}

// ═══════════════════════════════════════════════════════════════
// AI  (X = human / minimiser,  O = AI / maximiser)
// ═══════════════════════════════════════════════════════════════
function scheduleAI() {
    const delay = boardSize === 3 ? 180 : boardSize === 4 ? 320 : 480;
    setStatus('🤖 Thinking…', 's-o');
    aiTimer = setTimeout(() => {
        const idx = getBestMove();
        if (idx !== -1) doMove(idx);
    }, delay);
}

function cancelAI() {
    if (aiTimer !== null) { clearTimeout(aiTimer); aiTimer = null; }
}

function getBestMove() {
    if (boardSize === 3) return mm3Best();
    return mmLimBest(boardSize === 4 ? 5 : 3);
}

/* ── Full minimax for 3×3 ── */
function mm3Best() {
    let bestVal = -Infinity, bestIdx = -1;
    for (let i = 0; i < board.length; i++) {
        if (!board[i]) {
            board[i] = 'O';
            const v = mm3(0, false, -Infinity, Infinity);
            board[i] = null;
            if (v > bestVal) { bestVal = v; bestIdx = i; }
        }
    }
    return bestIdx;
}

function mm3(depth, isMax, alpha, beta) {
    const w = findWinner();
    if (w?.player === 'O') return 10 - depth;
    if (w?.player === 'X') return depth - 10;
    if (board.every(Boolean)) return 0;

    if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < board.length; i++) {
            if (!board[i]) {
                board[i] = 'O';
                best  = Math.max(best, mm3(depth + 1, false, alpha, beta));
                board[i] = null;
                alpha = Math.max(alpha, best);
                if (beta <= alpha) break;
            }
        }
        return best;
    } else {
        let best = Infinity;
        for (let i = 0; i < board.length; i++) {
            if (!board[i]) {
                board[i] = 'X';
                best  = Math.min(best, mm3(depth + 1, true, alpha, beta));
                board[i] = null;
                beta = Math.min(beta, best);
                if (beta <= alpha) break;
            }
        }
        return best;
    }
}

/* ── Depth-limited minimax for 4×4 / 5×5 ── */
function mmLimBest(maxDepth) {
    const cands = candidates(board);
    let bestVal = -Infinity, bestIdx = -1;
    for (const i of cands) {
        board[i] = 'O';
        const v = mmLim(0, maxDepth, false, -Infinity, Infinity);
        board[i] = null;
        if (v > bestVal) { bestVal = v; bestIdx = i; }
    }
    return bestIdx !== -1 ? bestIdx : board.findIndex(c => !c);
}

function mmLim(depth, maxDepth, isMax, alpha, beta) {
    const w = findWinner();
    if (w?.player === 'O') return 1000 - depth;
    if (w?.player === 'X') return depth - 1000;
    if (board.every(Boolean)) return 0;
    if (depth >= maxDepth) return scoreBoard();

    const cands = candidates(board);
    if (isMax) {
        let best = -Infinity;
        for (const i of cands) {
            board[i] = 'O';
            best  = Math.max(best, mmLim(depth + 1, maxDepth, false, alpha, beta));
            board[i] = null;
            alpha = Math.max(alpha, best);
            if (beta <= alpha) break;
        }
        return best;
    } else {
        let best = Infinity;
        for (const i of cands) {
            board[i] = 'X';
            best  = Math.min(best, mmLim(depth + 1, maxDepth, true, alpha, beta));
            board[i] = null;
            beta = Math.min(beta, best);
            if (beta <= alpha) break;
        }
        return best;
    }
}

/* Return empty cells that are adjacent (including diagonals) to any occupied cell */
function candidates(b) {
    const size = boardSize;
    const set  = new Set();
    for (let i = 0; i < b.length; i++) {
        if (!b[i]) continue;
        const r = Math.floor(i / size), c = i % size;
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                if (!dr && !dc) continue;
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
                    const ni = nr * size + nc;
                    if (!b[ni]) set.add(ni);
                }
            }
        }
    }
    if (set.size === 0) {
        // Board is empty — play center (or nearest)
        const center = Math.floor(size / 2) * size + Math.floor(size / 2);
        return [center];
    }
    return [...set];
}

/* Heuristic board evaluation: positive = good for O */
function scoreBoard() {
    const size = boardSize, win = winLen;
    const dirs = [[0,1],[1,0],[1,1],[1,-1]];
    let score = 0;
    for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
            for (const [dr, dc] of dirs) {
                const er = r + dr * (win - 1), ec = c + dc * (win - 1);
                if (er < 0 || er >= size || ec < 0 || ec >= size) continue;
                let oCnt = 0, xCnt = 0;
                for (let k = 0; k < win; k++) {
                    const v = board[(r + dr * k) * size + (c + dc * k)];
                    if (v === 'O') oCnt++;
                    else if (v === 'X') xCnt++;
                }
                if (oCnt && !xCnt) score += Math.pow(10, oCnt);
                if (xCnt && !oCnt) score -= Math.pow(10, xCnt);
            }
        }
    }
    return score;
}

// ═══════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════
function renderBoard() {
    const el   = _el('board');
    const size = boardSize;
    const gap  = 8;
    const maxW = Math.min(window.innerWidth - 52, 560);
    const cell = Math.floor((maxW - gap * (size - 1)) / size);
    const fs   = cell > 88 ? '2.5rem' : cell > 66 ? '2rem' : '1.55rem';
    const br   = cell > 88 ? '14px' : '11px';

    el.style.gridTemplateColumns = `repeat(${size}, ${cell}px)`;

    el.innerHTML = '';
    for (let i = 0; i < size * size; i++) {
        const div = document.createElement('div');
        div.className = 'cell';
        div.style.cssText = `width:${cell}px;height:${cell}px;font-size:${fs};border-radius:${br}`;

        if (board[i]) {
            div.classList.add('filled', board[i] === 'X' ? 'x-cell' : 'o-cell');
            const span = document.createElement('span');
            span.className = 'mark';
            span.textContent = board[i];
            div.appendChild(span);
        }
        if (winCells.includes(i)) div.classList.add('win-cell');
        if (gameOver || (vsAI && curPlayer === 'O' && !gameOver)) div.classList.add('blocked');

        div.addEventListener('click', () => cellClick(i));
        el.appendChild(div);
    }
}

function updateStatus() {
    const isX = curPlayer === 'X';
    const cls  = isX ? 's-x' : 's-o';
    let txt;
    if (vsAI) {
        txt = isX ? '🎯 Your turn  (X)' : '🤖 AI\'s turn  (O)';
    } else {
        txt = `Player ${curPlayer}'s turn`;
    }
    setStatus(txt, cls);
}

function setStatus(txt, cls) {
    const bar = _el('statusBar');
    bar.textContent = txt;
    bar.className   = `status-bar ${cls}`;
}

function updateScores() {
    _el('scoreX').textContent = scores.X;
    _el('scoreO').textContent = scores.O;
    _el('scoreD').textContent = scores.D;

    // highlight active player's box
    _el('boxX').classList.toggle('active-turn', !gameOver && curPlayer === 'X');
    _el('boxO').classList.toggle('active-turn', !gameOver && curPlayer === 'O');
    _el('boxD').classList.remove('active-turn');
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
const _el   = id => document.getElementById(id);
function _show(id) { _el(id).style.display = 'flex'; }
function _hide(id) { _el(id).style.display = 'none'; }

window.addEventListener('resize', () => {
    if (_el('screenGame').style.display !== 'none') renderBoard();
});

// ── Start ──
showModeScreen();
</script>
